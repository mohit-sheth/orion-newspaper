apiVersion: image.openshift.io/v1
kind: ImageStream
metadata:
  name: orion-newspaper
  namespace: orion-newspaper
  labels:
    app: orion-newspaper
spec:
  lookupPolicy:
    local: true
  tags:
    - name: latest
      from:
        kind: DockerImage
        name: quay.io/cloud-bulldozer/orion-newspaper:latest
      importPolicy:
        scheduled: true
      referencePolicy:
        type: Source
